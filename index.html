<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>勤怠カレンダー</title>
  <style>
    :root{
      --bg:#f7f8fb;
      --card:#ffffff;
      --line:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --accent:#111827;
      --free:#e8f7ea;
      --few:#fff3d8;
      --full:#ffe1e1;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{padding:16px}
    .wrap{max-width:760px;margin:0 auto}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 4px 20px rgba(0,0,0,.04);
    }
    .head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .title{
      font-size:20px;
      font-weight:700;
      letter-spacing:.02em;
    }
    .sub{
      font-size:12px;
      color:var(--muted);
    }
    .tabs{
      display:flex;
      gap:8px;
      margin:12px 0 16px;
      flex-wrap:wrap;
    }
    .tab{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
    }
    .tab.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    .weekday-row,.calendar-row{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
    }
    .weekday{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      padding:4px 0 8px;
      font-weight:700;
    }
    .cell{
      min-height:84px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:8px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:4px;
    }
    .cell.empty{
      background:transparent;
      border:none;
      cursor:default;
    }
    .cell.free{background:var(--free)}
    .cell.few{background:var(--few)}
    .cell.full{background:var(--full)}
    .cell.selected{
      outline:2px solid var(--accent);
      outline-offset:1px;
    }
    .day{
      font-size:14px;
      font-weight:700;
    }
    .meta{
      font-size:12px;
      color:#374151;
    }
    .mine{
      font-size:12px;
      font-weight:700;
      color:#111827;
      margin-top:auto;
    }
    .loading{
      padding:18px 0;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }
    .panel{
      margin-top:14px;
      display:grid;
      gap:10px;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .field{
      display:grid;
      gap:6px;
    }
    label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }
    select,button{
      width:100%;
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 12px;
      font-size:14px;
    }
    button{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
      font-weight:700;
      cursor:pointer;
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .selected-box{
      padding:12px;
      border-radius:12px;
      background:#f9fafb;
      border:1px solid var(--line);
      font-size:14px;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      opacity:0;
      pointer-events:none;
      transition:.2s;
      font-size:13px;
      z-index:9999;
    }
    .toast.show{opacity:1}
    @media (max-width:520px){
      .cell{min-height:76px;padding:6px}
      .row{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="title">勤怠カレンダー</div>
          <div class="sub">初回は当月のみ読込 / 当月＋2か月表示 / 月キャッシュ対応</div>
        </div>
        <div id="userBadge" class="sub">user: -</div>
      </div>

      <div id="monthTabs" class="tabs"></div>

      <div class="weekday-row">
        <div class="weekday">日</div>
        <div class="weekday">月</div>
        <div class="weekday">火</div>
        <div class="weekday">水</div>
        <div class="weekday">木</div>
        <div class="weekday">金</div>
        <div class="weekday">土</div>
      </div>

      <div id="calendarLoading" class="loading">読み込み中...</div>
      <div id="calendarBody"></div>

      <div class="panel">
        <div class="selected-box">選択日: <strong id="selectedDate">未選択</strong></div>

        <div class="row">
          <div class="field">
            <label for="requestType">申請種別</label>
            <select id="requestType">
              <option value="公休">公休</option>
              <option value="遅公">遅公</option>
              <option value="特公">特公</option>
              <option value="届出">届出</option>
            </select>
          </div>

          <div class="field">
            <label for="requestMode">操作</label>
            <select id="requestMode">
              <option value="apply">申請</option>
              <option value="cancel">取消</option>
            </select>
          </div>
        </div>

        <button id="submitBtn" type="button">送信する</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      MAX_VISIBLE_MONTHS: 3,   // 当月 + 2か月先
      DAY_LIMIT: 3,
      RELAY_BASE_URL: '',      // 例: 'https://xxxxx.workers.dev'
      LIFF_ID: ''              // 使っているなら入れる。不要なら空でOK
    };

    const state = {
      userId: '',
      visibleMonths: [],
      activeYm: '',
      selectedDate: '',
      monthCache: new Map(),
      loadingPromises: new Map()
    };

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await initUser();
        initVisibleMonths();
        renderMonthTabs();
        bindEvents();

        const firstYm = state.visibleMonths[0];
        state.activeYm = firstYm;
        setActiveTab(firstYm);

        await openMonth(firstYm); // 初回は当月だけ
      } catch (err) {
        console.error(err);
        showToast(err.message || '初期化に失敗しました');
      }
    });

    async function initUser() {
      // LIFF未使用でも動くようにしている
      const q = new URLSearchParams(location.search);
      const queryUserId = q.get('userId');
      if (queryUserId) {
        state.userId = queryUserId;
      } else {
        state.userId = localStorage.getItem('attendance_user_id') || '';
      }

      const badge = document.getElementById('userBadge');
      badge.textContent = 'user: ' + (state.userId || '-');
    }

    function initVisibleMonths() {
      const now = new Date();
      const base = new Date(now.getFullYear(), now.getMonth(), 1);
      state.visibleMonths = [];

      for (let i = 0; i < CONFIG.MAX_VISIBLE_MONTHS; i++) {
        const d = new Date(base.getFullYear(), base.getMonth() + i, 1);
        state.visibleMonths.push(formatYm(d));
      }
    }

    function renderMonthTabs() {
      const el = document.getElementById('monthTabs');
      el.innerHTML = state.visibleMonths.map(ym => {
        const [y,m] = ym.split('-');
        return `<button class="tab" data-ym="${ym}">${Number(m)}月</button>`;
      }).join('');
    }

    function bindEvents() {
      document.getElementById('monthTabs').addEventListener('click', async (e) => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        const ym = btn.dataset.ym;
        if (!ym || ym === state.activeYm) return;

        state.activeYm = ym;
        setActiveTab(ym);
        await openMonth(ym);
      });

      document.getElementById('calendarBody').addEventListener('click', (e) => {
        const cell = e.target.closest('.cell[data-date]');
        if (!cell) return;
        const ymd = cell.dataset.date;
        selectDate(ymd);
      });

      document.getElementById('submitBtn').addEventListener('click', submitRequest);
    }

    function setActiveTab(ym) {
      document.querySelectorAll('.tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.ym === ym);
      });
    }

    async function openMonth(ym) {
      setCalendarLoading(true);
      try {
        let monthData = state.monthCache.get(ym);
        if (!monthData) {
          monthData = await fetchMonthData(ym);
          state.monthCache.set(ym, monthData);
        }
        renderMonth(monthData);
      } finally {
        setCalendarLoading(false);
      }
    }

    async function fetchMonthData(ym, force = false) {
      if (!force && state.monthCache.has(ym)) {
        return state.monthCache.get(ym);
      }

      if (!force && state.loadingPromises.has(ym)) {
        return state.loadingPromises.get(ym);
      }

      const p = (async () => {
        const qs = new URLSearchParams({ ym });
        if (state.userId) qs.set('userId', state.userId);

        const res = await fetch(`${CONFIG.RELAY_BASE_URL}/api/calendar-month?${qs.toString()}`, {
          method: 'GET'
        });
        const json = await res.json();
        if (!json.ok) throw new Error(json.message || '月データ取得失敗');

        state.monthCache.set(ym, json);
        return json;
      })();

      state.loadingPromises.set(ym, p);
      try {
        return await p;
      } finally {
        state.loadingPromises.delete(ym);
      }
    }

    function renderMonth(monthData) {
      const el = document.getElementById('calendarBody');
      const ym = monthData.ym;
      const [year, month] = ym.split('-').map(Number);

      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const firstWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      let html = '';
      let dayCounter = 1;

      for (let row = 0; row < 6; row++) {
        html += `<div class="calendar-row">`;

        for (let col = 0; col < 7; col++) {
          const idx = row * 7 + col;

          if (idx < firstWeekday || dayCounter > daysInMonth) {
            html += `<div class="cell empty"></div>`;
            continue;
          }

          const date = new Date(year, month - 1, dayCounter);
          const ymd = formatYmd(date);
          const info = monthData.days?.[ymd] || {
            date: ymd,
            count: 0,
            limit: CONFIG.DAY_LIMIT,
            status: 'free',
            myStatus: null
          };

          html += renderDayCell(info, dayCounter, ymd === state.selectedDate);
          dayCounter++;
        }

        html += `</div>`;
        if (dayCounter > daysInMonth) break;
      }

      el.innerHTML = html;
    }

    function renderDayCell(info, dayNum, selected) {
      const klass = info.status || 'free';
      const mine = info.myStatus ? `<div class="mine">${escapeHtml(info.myStatus)}</div>` : '';
      return `
        <div class="cell ${klass} ${selected ? 'selected' : ''}" data-date="${info.date}">
          <div class="day">${dayNum}</div>
          <div class="meta">${Number(info.count || 0)}/${Number(info.limit || CONFIG.DAY_LIMIT)}</div>
          ${mine}
        </div>
      `;
    }

    function selectDate(ymd) {
      state.selectedDate = ymd;
      document.getElementById('selectedDate').textContent = ymd;

      document.querySelectorAll('.cell[data-date]').forEach(cell => {
        cell.classList.toggle('selected', cell.dataset.date === ymd);
      });
    }

    async function submitRequest() {
      if (!state.selectedDate) {
        showToast('先に日付を選択してください');
        return;
      }

      const btn = document.getElementById('submitBtn');
      const type = document.getElementById('requestType').value;
      const mode = document.getElementById('requestMode').value;

      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const res = await fetch(`${CONFIG.RELAY_BASE_URL}/api/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            date: state.selectedDate,
            type,
            mode,
            userId: state.userId
          })
        });

        const json = await res.json();
        if (!json.ok) throw new Error(json.message || '送信失敗');

        showToast(json.message || '受付OK');

        // ④ 該当日だけ差し替え
        if (json.updatedDay) {
          patchDayInCache(json.updatedDay);
          patchDayCell(json.updatedDay);
        } else {
          // 万一 updatedDay が来ない場合は、その月だけ再読込
          const ym = state.selectedDate.slice(0, 7);
          const monthData = await fetchMonthData(ym, true);
          renderMonth(monthData);
        }
      } catch (err) {
        console.error(err);
        showToast(err.message || '送信に失敗しました');
      } finally {
        btn.disabled = false;
        btn.textContent = '送信する';
      }
    }

    function patchDayInCache(updatedDay) {
      const ym = updatedDay.date.slice(0, 7);
      const monthData = state.monthCache.get(ym);
      if (!monthData) return;
      if (!monthData.days) monthData.days = {};
      monthData.days[updatedDay.date] = updatedDay;
      state.monthCache.set(ym, monthData);
    }

    function patchDayCell(updatedDay) {
      const cell = document.querySelector(`.cell[data-date="${updatedDay.date}"]`);
      if (!cell) return;

      const dayText = cell.querySelector('.day')?.textContent || updatedDay.date.slice(-2);
      const html = renderDayCell(updatedDay, Number(dayText), updatedDay.date === state.selectedDate);

      const tmp = document.createElement('div');
      tmp.innerHTML = html.trim();
      const newCell = tmp.firstElementChild;
      cell.replaceWith(newCell);
    }

    function setCalendarLoading(flag) {
      document.getElementById('calendarLoading').style.display = flag ? 'block' : 'none';
    }

    function showToast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function formatYm(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function formatYmd(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
